name: Scheduled layout update 20260708-1530

on:
  schedule:
    - cron: '30 6 8 7 *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Backup and replace index.html
        run: |
          mkdir -p backups
          cp index.html backups/index-before-20260708-1530.html
          cp scheduled_updates/floormap-20260708-1530.html index.html

      - name: Commit scheduled update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html backups/index-before-20260708-1530.html
          git commit -m "Apply scheduled layout update 20260708-1530" || exit 0
          git push
